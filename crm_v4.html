<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Workflow Studio v3</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0d1117;color:#c9d1d9;font-family:'Inter',system-ui,sans-serif;font-size:13px}

/* ── TOOLBAR ── */
#tb{height:46px;background:#161b22;border-bottom:1px solid #21262d;display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0;position:relative;z-index:20}
#tb-dot{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
#tb-name{font-size:13px;font-weight:600;color:#e6edf3}
.tb-sep{width:1px;height:20px;background:#21262d}
.chip{font-size:10px;padding:2px 9px;border-radius:4px;border:1px solid var(--bc);color:var(--tc);background:var(--bg);font-family:'IBM Plex Mono',monospace;white-space:nowrap}
#tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
#btn-back{display:none;padding:5px 14px;border-radius:6px;border:1px solid #30363d;background:#1c2128;color:#e6edf3;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;gap:6px;align-items:center}
#btn-back:hover{border-color:#3b82f6;color:#3b82f6}
#btn-back.vis{display:flex}
#breadcrumb{font-size:11px;color:#3d444d;font-family:'IBM Plex Mono',monospace}
#breadcrumb span{color:#e6edf3}
.tz{padding:3px 9px;border-radius:4px;border:1px solid #21262d;background:#1c2128;color:#6e7681;font-size:11px;cursor:pointer}
.tz:hover{color:#e6edf3}

/* ── MAIN LAYOUT ── */
#body{flex:1;display:flex;overflow:hidden;height:calc(100vh - 46px)}

/* ── CANVAS ── */
#cw{flex:1;overflow:hidden;position:relative;cursor:grab;background:#0d1117;background-image:radial-gradient(circle,rgba(48,54,61,.55) 1px,transparent 1px);background-size:24px 24px}
#cw.drag{cursor:grabbing}
#cw.browse{cursor:default}
#canvas{position:absolute;transform-origin:0 0;width:1440px;height:860px}
#svgl{position:absolute;top:0;left:0;width:1440px;height:860px;pointer-events:none}
#nl{position:absolute;top:0;left:0;width:1440px;height:860px}

/* ── MODULE NODES ── */
.mnode{position:absolute;border-radius:12px;background:#161b22;border:1.5px solid #21262d;cursor:pointer;overflow:hidden;transition:opacity .4s,transform .4s,border-color .2s,box-shadow .2s}
.mnode:hover{border-color:#30363d;transform:scale(1.02)}
.mnode.dimmed{opacity:.12;pointer-events:none}
.mnode.highlighted{border-color:var(--mc)!important;box-shadow:0 0 0 3px var(--mglow),0 8px 32px var(--mglow)}
.mnode-bar{height:4px}
.mnode-inner{padding:12px 14px 10px}
.mn-tag{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.mn-tag .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.mn-name{font-size:13px;font-weight:700;color:#e6edf3;letter-spacing:-.2px;margin-bottom:3px}
.mn-sub{font-size:10px;color:#484f58;line-height:1.45;margin-bottom:1px}
.mn-pills{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.mn-pill{font-size:9px;padding:2px 7px;border-radius:3px;background:rgba(255,255,255,.04);border:1px solid #21262d;color:#484f58;font-family:'IBM Plex Mono',monospace}
.mn-pill.hi{border-color:var(--mc);color:var(--mc);background:var(--mglow)}

/* ── FLOW DETAIL LAYER ── */
#flow-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:0;transition:opacity .35s}
#flow-layer.vis{opacity:1;pointer-events:auto}
#flow-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#flow-nodes{position:absolute;top:0;left:0;width:100%;height:100%}

/* ── FLOW CARDS (step by step) ── */
.fcard{position:absolute;background:#161b22;border-radius:11px;border:1px solid #21262d;overflow:hidden;cursor:default;transition:box-shadow .15s}
.fcard:hover{box-shadow:0 0 0 1px rgba(255,255,255,.06),0 4px 16px rgba(0,0,0,.4)}
.fcard-bar{height:3px}
.fcard-head{padding:10px 12px 7px;border-bottom:1px solid #21262d}
.fcard-num{font-size:9px;font-weight:600;font-family:'IBM Plex Mono',monospace;margin-bottom:4px}
.fcard-title{font-size:12px;font-weight:600;color:#e6edf3;line-height:1.3;margin-bottom:2px}
.fcard-desc{font-size:10px;color:#484f58;line-height:1.4}
.fcard-steps{padding:8px 12px;display:flex;flex-direction:column;gap:4px}
.fstep{display:flex;gap:7px;align-items:flex-start}
.fstep-dot{width:16px;height:16px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#fff;margin-top:1px}
.fstep-who{font-size:8px;font-weight:600;font-family:'IBM Plex Mono',monospace;margin-bottom:1px}
.fstep-what{font-size:10px;color:#8b949e;line-height:1.3}
.fcard-benefit{margin:0 12px 10px;padding:6px 9px;border-radius:6px;border:1px solid var(--bc);background:var(--bbg);display:flex;align-items:flex-start;gap:6px}
.fcard-benefit-icon{font-size:11px;flex-shrink:0;margin-top:1px}
.fcard-benefit-text{font-size:10px;color:var(--btc);line-height:1.4}
.fcard-benefit-label{font-size:8px;font-weight:600;font-family:'IBM Plex Mono',monospace;letter-spacing:.05em;margin-bottom:2px}
.fcard-branch{margin:4px 12px 8px;padding:7px;border-radius:6px;border:1px dashed #2a3548;background:rgba(255,255,255,.015)}
.fcard-branch-lbl{font-size:8px;color:#3d444d;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.fcard-branch-row{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.fcard-bcard{border-radius:5px;padding:6px 8px;border:1px solid #21262d}
.fcard-bcard-h{font-size:9px;font-weight:600;margin-bottom:2px}
.fcard-bcard-b{font-size:9px;color:#484f58;line-height:1.35}

/* ── LEGEND ── */
#legend{position:absolute;bottom:14px;left:14px;background:rgba(22,27,34,.92);border:1px solid #21262d;border-radius:8px;padding:9px 12px;pointer-events:none;z-index:5}
.lg{display:flex;align-items:center;gap:7px;font-size:10px;color:#3d444d;margin-bottom:3px}
.lg:last-child{margin:0}
.lg-l{width:22px;height:2px}

/* ── MOD HINT ── */
#mod-hint{position:absolute;bottom:14px;right:14px;background:rgba(22,27,34,.92);border:1px solid #21262d;border-radius:8px;padding:9px 14px;pointer-events:none;z-index:5;transition:opacity .3s}
#mod-hint.hidden{opacity:0}
.mh-text{font-size:10px;color:#3d444d;font-family:'IBM Plex Mono',monospace}
.mh-text span{color:#6e7681}
</style>
</head>
<body>
<div id="app" style="display:flex;flex-direction:column;height:100vh">

<!-- TOOLBAR -->
<div id="tb">
  <div id="tb-dot">⚡</div>
  <span id="tb-name">CRM Workflow Studio</span>
  <div class="tb-sep"></div>
  <span class="chip" style="--tc:#3b82f6;--bg:rgba(59,130,246,.1);--bc:rgba(59,130,246,.25)">Sistema Postventa Automotriz</span>
  <span class="chip" style="--tc:#8b5cf6;--bg:rgba(139,92,246,.1);--bc:rgba(139,92,246,.25)">6 módulos · 26 flujos</span>
  <div id="tb-right">
    <span id="breadcrumb">Mapa general</span>
    <button id="btn-back" onclick="goBack()">← Volver al mapa</button>
    <button class="tz" onclick="zoom(.12)">＋</button>
    <button class="tz" onclick="zoom(-.12)">－</button>
    <button class="tz" onclick="resetV()">↺</button>

</div>

<div id="body">
<div id="cw">
  <div id="canvas">
    <svg id="svgl"></svg>
    <div id="nl"></div>
    <div id="flow-layer">
      <svg id="flow-svg"></svg>
      <div id="flow-nodes"></div>
    </div>
  </div>
  <div id="legend">
    <div class="lg"><div class="lg-l" style="background:#3b82f6"></div>CRM — corazón del sistema</div>
    <div class="lg"><div class="lg-l" style="background:repeating-linear-gradient(90deg,#3a4556 0,#3a4556 4px,transparent 4px,transparent 8px)"></div>Flujo de datos</div>
    <div class="lg"><div class="lg-l" style="background:#3a4556"></div>Flujo de proceso</div>
  </div>
  <div id="mod-hint">
    <div class="mh-text"><span>Clic en cualquier módulo</span> para ver sus flujos en detalle</div>
  </div>
</div>
</div>
</div>

<script>
// ── COLORS ────────────────────────────────────────────────
const MC={crm:'#3b82f6',ag:'#1db870',ta:'#8b5cf6',rf:'#f59e0b',ve:'#f43f5e',bj:'#06b6d4'};
const GLOW={crm:'rgba(59,130,246,.15)',ag:'rgba(29,184,112,.15)',ta:'rgba(139,92,246,.15)',rf:'rgba(245,158,11,.12)',ve:'rgba(244,63,94,.13)',bj:'rgba(6,182,212,.13)'};

// ── MAIN NODES POSITIONS ──────────────────────────────────
const MN={
  crm:{x:490,y:300,w:260,h:152,c:MC.crm,tag:'Módulo central',name:'CRM',subs:['Clientes · Empresas · Vehículos','Historial completo · Garantías · Preferencias','Agenda · Actividades · Outlook sync'],pills:[{t:'Corazón del sistema',hi:true},{t:'Historial vehículo'},{t:'Agenda + Outlook'}]},
  ag:{x:32,y:186,w:216,h:128,c:MC.ag,tag:'Módulo',name:'CITAS',subs:['SF · Seekop · ClearMechanic · Drive','Contactos automáticos · Recordatorios','Mapa de sucursal al cliente'],pills:[{t:'5 flujos'}]},
  ta:{x:1002,y:186,w:216,h:128,c:MC.ta,tag:'Módulo',name:'TALLER (PDV)',subs:['Seguimiento tiempo real · Link sin app','Piezas · Garantías · Trabajo adicional','CSI · Firma digital · Venta perdida'],pills:[{t:'7 flujos'}]},
  rf:{x:32,y:504,w:216,h:116,c:MC.rf,tag:'Módulo',name:'REFACCIONES',subs:['Maestro de partes · PDF con OEM','Cotizaciones · Scraping portal marca'],pills:[{t:'3 flujos'}]},
  ve:{x:1002,y:504,w:216,h:116,c:MC.ve,tag:'Módulo',name:'VENTAS',subs:['Pipeline de leads · Seguimiento','Prospección · Cruce de servicios'],pills:[{t:'4 flujos'}]},
  bj:{x:524,y:622,w:212,h:108,c:MC.bj,tag:'Transversal',name:'BANDEJA + IA',subs:['WA · FB · IG · Email unificados','Escalación automática · Bot activo'],pills:[{t:'5 flujos'}]},

// ── STEP TYPES ────────────────────────────────────────────
const ST={

  S:{c:'#f59e0b',n:'Sistema'},L:{c:'#ef4444',n:'Alerta'},F:{c:'#22c55e',n:'Resultado'},
  I:{c:'#f43f5e',n:'IA'},G:{c:'#38bdf8',n:'Gerente'},M:{c:'#f43f5e',n:'MK / Atención'},
  D:{c:'#64748b',n:'Archivo / DMS'},K:{c:'#3b82f6',n:'CRM'},V:{c:'#f43f5e',n:'Ventas'},
  E:{c:'#1db870',n:'Encargada de citas'},
};

// ── FLOWS DATA ────────────────────────────────────────────
// Each flow: {n: name, desc: short desc, benefit: {icon, label, text}, steps: [{t,w,x}], branch?: {lbl, cols}}
const FLOWS={
  ag:[
    {n:'Lectura del archivo de citas',
     desc:'Lee el archivo del Drive, SF, Seekop o ClearMechanic y lo convierte en registros en el CRM — sin que nadie capture nada manualmente.',
     benefit:{icon:'⚡',label:'Beneficio operativo',text:'Cero capturas dobles. Las citas del sistema de agendamiento aparecen solas en el CRM y en la agenda de la encargada.'},
     steps:[{t:'D',w:'Archivo (Drive / SF / Seekop)',x:'Comparte el archivo de citas del día — CSV, Excel o exportación directa'},{t:'S',w:'Sistema',x:'Lee el archivo, valida los datos y extrae: nombre, WA, fecha, hora, sucursal'},{t:'K',w:'CRM',x:'Crea o actualiza el registro del cliente y su vehículo. Vincula la cita.'},{t:'E',w:'Encargada de citas',x:'La cita aparece en su agenda CRM como "Contacto pendiente" y en su Outlook'},{t:'F',w:'Resultado',x:'Agenda actualizada · 0 capturas manuales · Cliente registrado en BD'}]},

     steps:[{t:'E',w:'Encargada de citas',x:'Ve el "Contacto pendiente" en su agenda · Tiene 15 min para llamar o mandar WA'},{t:'L',w:'Si NO actúa en 15 min',x:'El sistema detecta que el contacto sigue sin realizarse'},{t:'B',w:'Bot IA — automático',x:'Lanza WA personalizado: "Hola [nombre], tu cita es el [fecha] a las [hora] en [sucursal]. 📍 Cómo llegar: [link Maps]"'},{t:'K',w:'CRM',x:'Registra el contacto como "realizado por sistema" · Actividad marcada en agenda de la encargada'},{t:'F',w:'Resultado',x:'Cliente informado · La encargada ve qué contactos hizo ella y cuáles hizo el bot'}],
     branch:{lbl:'Si la encargada sí actúa antes de los 15 min →',cols:[{bc:'#1db870',h:'Realiza la llamada',b:'Marca el contacto como realizado. El bot NO interviene.'},{bc:'#06b6d4',h:'Envía WA manualmente',b:'Desde la bandeja del CRM con el mapa incluido. Queda registrado.'}]}},
    {n:'Recordatorio 24h y 2h antes',

    {n:'No-show: recuperación',

       {t:'E',w:'Encargada de citas',x:'Recibe simultáneamente: ① WA: "Tienes actividad urgente: [cliente] quiere agendar instalación de [pieza]. Ya confirmó interés." ② Email con los mismos datos ③ Actividad visible en su agenda CRM ④ Evento creado en su Outlook',nt:''},

       {t:'F',w:'Resultado',x:'Cita agendada · Ciclo cerrado · Historial completo en CRM · Sin perseguir al cliente ni al asesor',nt:''},

    {n:'Trabajo adicional detectado',
     desc:'El técnico encuentra un problema extra. El cliente lo ve con foto y decide en minutos desde su teléfono.',

     steps:[{t:'A',w:'Técnico / Asesor',x:'Detecta problema adicional · Toma foto o video como evidencia'},{t:'B',w:'Sistema',x:'WA al cliente: foto + descripción simple + costo desglosado + botones de respuesta'},{t:'C',w:'Cliente',x:'Autorizo / No por ahora / Necesito más información'},
     {t:'F',w:'Resultado',x:'Aprueba → trabajo suma a OT · Rechaza → recordatorio automático a 30 días en CRM'}],

function P(id,side){
  const n=MN[id];const cx=n.x+n.w/2,cy=n.y+n.h/2;
  if(side==='T')return{x:cx,y:n.y};if(side==='B')return{x:cx,y:n.y+n.h};
  if(side==='L')return{x:n.x,y:cy};if(side==='R')return{x:n.x+n.w,y:cy};
  if(side==='TL')return{x:n.x+n.w*.28,y:n.y};if(side==='TR')return{x:n.x+n.w*.72,y:n.y};
  if(side==='BL')return{x:n.x+n.w*.28,y:n.y+n.h};if(side==='BR')return{x:n.x+n.w*.72,y:n.y+n.h};
}
function bez(p1,p2,c1,c2){
  if(c1&&c2)return`M${p1.x},${p1.y} C${c1.x},${c1.y} ${c2.x},${c2.y} ${p2.x},${p2.y}`;
  const dx=p2.x-p1.x,dy=p2.y-p1.y,ax=Math.abs(dx),ay=Math.abs(dy);
  let cp1,cp2;
  if(ax>ay){cp1={x:p1.x+dx*.5,y:p1.y};cp2={x:p2.x-dx*.5,y:p2.y};}
  else{cp1={x:p1.x,y:p1.y+dy*.5};cp2={x:p2.x,y:p2.y-dy*.5};}
  return`M${p1.x},${p1.y} C${cp1.x},${cp1.y} ${cp2.x},${cp2.y} ${p2.x},${p2.y}`;
}

  d.style.cssText=`left:${n.x}px;top:${n.y}px;width:${n.w}px;--mc:${n.c};--mglow:${GLOW[id]}`;
  const pills=(n.pills||[]).map(p=>p.hi
    ?`<span class="mn-pill hi" style="--mc:${n.c}">${p.t}</span>`
    :`<span class="mn-pill">${p.t}</span>`).join('');
  d.innerHTML=`<div class="mnode-bar" style="background:${n.c}"></div>
<div class="mnode-inner">
  <div class="mn-tag"><span class="dot" style="background:${n.c}"></span><span style="color:${n.c}">${n.tag}</span></div>
  <div class="mn-name">${n.name}</div>
  ${n.subs.map(s=>`<div class="mn-sub">${s}</div>`).join('')}
  ${pills?`<div class="mn-pills">${pills}</div>`:''}
</div>`;
  d.addEventListener('click',()=>zoomModule(id));
  nl.appendChild(d);
});

// ── BUILD MAIN SVG EDGES ──────────────────────────────────
const svg=document.getElementById('svgl');
let defs='<defs>';
Object.entries(MC).forEach(([k,v])=>{
  defs+=`<marker id="m${k}" markerWidth="7" markerHeight="5" refX="6.5" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="${v}" opacity=".8"/></marker>`;
});
defs+=`<marker id="mgray" markerWidth="7" markerHeight="5" refX="6.5" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#3a4556"/></marker></defs>`;
svg.innerHTML=defs;
const elblLayer=nl;
EDGES.forEach(e=>{
  const p1=P(e.f,e.fp),p2=P(e.t,e.tp);if(!p1||!p2)return;
  const path=e.c1?bez(p1,p2,e.c1,e.c2):bez(p1,p2);
  const gray=e.c==='#2a3548';
  const mk=gray?'mgray':'m'+e.t;
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.className='main-edge';
  g.innerHTML=`<path d="${path}" fill="none" stroke="${e.c}" stroke-width="${e.d?1:1.5}" ${e.d?'stroke-dasharray="6 4"':''} marker-end="url(#${mk})" opacity="${e.d?.4:.7}"/>`;
  svg.appendChild(g);
  if(!e.d&&e.lbl){
    const div=document.createElement('div');
    div.className='elbl main-elbl';
    div.style.cssText=`left:${e.lx||0}px;top:${e.ly||0}px`;
    div.textContent=e.lbl;
    elblLayer.appendChild(div);
  }
});

// ── ZOOM INTO MODULE ──────────────────────────────────────
let currentModule=null;
let tx=28,ty=18,sc=.80;

function zoomModule(id){
  currentModule=id;
  const n=MN[id];
  const cw=document.getElementById('cw');
  const cwW=cw.clientWidth, cwH=cw.clientHeight;

  // highlight selected, dim others
  document.querySelectorAll('.mnode').forEach(el=>{
    const eid=el.id.replace('mn-','');
    el.classList.toggle('dimmed',eid!==id);
    el.classList.toggle('highlighted',eid===id);
  });
  document.querySelectorAll('.main-edge,.main-elbl').forEach(el=>el.style.opacity='0.06');

  // compute target transform to center the selected node
  const targetSc=Math.min(cwW/(n.w+320), cwH/(n.h+120), 1.05);
  const targetTx=cwW/2-(n.x+n.w/2)*targetSc;
  const targetTy=cwH/2-(n.y+n.h/2)*targetSc - 60;

  // animate pan+scale
  animateTo(targetTx, targetTy, targetSc, 500, ()=>{
    buildFlowLayer(id, n);
    document.getElementById('flow-layer').classList.add('vis');
  });

  // toolbar
  document.getElementById('btn-back').classList.add('vis');
  document.getElementById('breadcrumb').innerHTML=`Mapa general &rsaquo; <span>${n.name}</span>`;
  document.getElementById('mod-hint').classList.add('hidden');
  document.getElementById('cw').classList.add('browse');
}

function goBack(){
  currentModule=null;
  document.getElementById('flow-layer').classList.remove('vis');
  document.querySelectorAll('.mnode').forEach(el=>{el.classList.remove('dimmed','highlighted');});
  document.querySelectorAll('.main-edge,.main-elbl').forEach(el=>el.style.opacity='');
  animateTo(28,18,.80,400);
  document.getElementById('btn-back').classList.remove('vis');
  document.getElementById('breadcrumb').textContent='Mapa general';
  document.getElementById('mod-hint').classList.remove('hidden');
  document.getElementById('cw').classList.remove('browse');
  setTimeout(()=>{
    document.getElementById('flow-nodes').innerHTML='';
    document.getElementById('flow-svg').innerHTML='';
  },420);
}

// ── BUILD FLOW CARDS LAYER ────────────────────────────────
function buildFlowLayer(id, mnode){
  const flowSvg=document.getElementById('flow-svg');
  const flowNodes=document.getElementById('flow-nodes');
  flowNodes.innerHTML=''; flowSvg.innerHTML='';

  const flows=FLOWS[id]||[];
  const color=MC[id];
  const cw=document.getElementById('cw');
  const cwW=cw.clientWidth, cwH=cw.clientHeight;
  const sc2=parseFloat(document.getElementById('canvas').style.transform.match(/scale\(([^)]+)\)/)?.[1]||0.8);

  // Module node center in screen coords
  const nx=(mnode.x+mnode.w/2)*sc2+parseFloat(document.getElementById('canvas').style.transform.match(/translate\(([^,]+)/)?.[1]||28);
  const ny=(mnode.y+mnode.h/2)*sc2+parseFloat(document.getElementById('canvas').style.transform.match(/,([^p]+)px/)?.[1]||18);

  // Flow card dimensions
  const CARD_W=310;
  const cols=Math.min(3, flows.length);
  const totalW=cols*CARD_W+(cols-1)*24;
  const startX=(cwW-totalW)/2;

  // SVG for connectors
  const svgEl=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svgEl.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none';
  const defs2=document.createElementNS('http://www.w3.org/2000/svg','defs');
  const mk=document.createElementNS('http://www.w3.org/2000/svg','marker');
  mk.setAttribute('id','flarr');mk.setAttribute('markerWidth','7');mk.setAttribute('markerHeight','5');
  mk.setAttribute('refX','6.5');mk.setAttribute('refY','2.5');mk.setAttribute('orient','auto');
  const poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');
  poly.setAttribute('points','0 0,7 2.5,0 5');poly.setAttribute('fill',color);poly.setAttribute('opacity','.7');
  mk.appendChild(poly);defs2.appendChild(mk);svgEl.appendChild(defs2);
  flowSvg.appendChild(svgEl);

  flows.forEach((f,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    const cx=startX+col*(CARD_W+24);
    const baseY=cwH*.14;
    const cy=baseY+row*(cwH*.53);

    // Draw connector from module center to card
    const cardCenterX=cx+CARD_W/2;
    const cardTopY=cy;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    const dy=cardTopY-ny;
    const pathD=`M${nx},${ny} C${nx},${ny+dy*.4} ${cardCenterX},${cardTopY-dy*.3} ${cardCenterX},${cardTopY}`;
    path.setAttribute('d',pathD);
    path.setAttribute('fill','none');
    path.setAttribute('stroke',color);
    path.setAttribute('stroke-width','1.5');
    path.setAttribute('stroke-dasharray','6 4');
    path.setAttribute('opacity','0.5');
    path.setAttribute('marker-end','url(#flarr)');
    svgEl.appendChild(path);

    // Build card
    const card=document.createElement('div');
    card.className='fcard';
    card.style.cssText=`left:${cx}px;top:${cy}px;width:${CARD_W}px;max-height:${cwH*.48}px;overflow-y:auto`;
    card.style.setProperty('--bc',color+'40');
    card.style.setProperty('--bbg',color+'0d');
    card.style.setProperty('--btc',color);

    // steps
    const allSteps=[...(f.steps||[]),...(f.steps2||[])];
    const stepsHtml=allSteps.map(s=>{
      const ts=ST[s.t]||ST.A;
      return`<div class="fstep">
<div class="fstep-dot" style="background:${ts.c}">${s.t}</div>
<div>
  <div class="fstep-who" style="color:${ts.c}">${s.w||ts.n}</div>
  <div class="fstep-what">${s.x}</div>
</div></div>`;
    }).join('');

    // branch
    let branchHtml='';
    if(f.branch){
      branchHtml=`<div class="fcard-branch">
<div class="fcard-branch-lbl">${f.branch.lbl}</div>
<div class="fcard-branch-row">${f.branch.cols.map(c=>`<div class="fcard-bcard" style="border-color:${c.bc}40;background:${c.bc}08"><div class="fcard-bcard-h" style="color:${c.bc}">${c.h}</div><div class="fcard-bcard-b">${c.b}</div></div>`).join('')}</div>
</div>`;
    }

    card.innerHTML=`<div class="fcard-bar" style="background:${color}"></div>
<div class="fcard-head">
  <div class="fcard-num" style="color:${color}">F${String(i+1).padStart(2,'0')} · ${id.toUpperCase()}</div>
  <div class="fcard-title">${f.n}</div>
  <div class="fcard-desc">${f.desc}</div>
</div>
<div class="fcard-steps">${stepsHtml}</div>
${branchHtml}
<div class="fcard-benefit">
  <span class="fcard-benefit-icon">${f.benefit.icon}</span>
  <div>
    <div class="fcard-benefit-label" style="color:${color}">${f.benefit.label}</div>
    <div class="fcard-benefit-text">${f.benefit.text}</div>
  </div>
</div>`;

    card.style.scrollbarWidth='thin';
    card.style.scrollbarColor=`${color}40 transparent`;
    flowNodes.appendChild(card);
  });
}

// ── PAN / ZOOM ────────────────────────────────────────────
let drag=false,sx=0,sy=0,ox=0,oy=0;
const cw=document.getElementById('cw');
const cv=document.getElementById('canvas');
const applyT=()=>cv.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;
applyT();

cw.addEventListener('mousedown',e=>{
  if(currentModule)return;
  if(!e.target.closest('.mnode')){drag=true;sx=e.clientX;sy=e.clientY;ox=tx;oy=ty;cw.classList.add('drag');}
});
window.addEventListener('mousemove',e=>{if(!drag)return;tx=ox+(e.clientX-sx);ty=oy+(e.clientY-sy);applyT();});
window.addEventListener('mouseup',()=>{drag=false;cw.classList.remove('drag');});
cw.addEventListener('wheel',e=>{
  if(currentModule)return;
  e.preventDefault();sc=Math.max(.3,Math.min(1.8,sc+(e.deltaY<0?.08:-.08)));applyT();
},{passive:false});
function zoom(d){if(currentModule)return;sc=Math.max(.3,Math.min(1.8,sc+d));applyT();}
function resetV(){if(currentModule)goBack();tx=28;ty=18;sc=.80;applyT();}

// smooth animation
function animateTo(ttx,tty,tsc,dur,cb){
  const startTx=tx,startTy=ty,startSc=sc;
  const t0=performance.now();
  function step(now){
    const p=Math.min((now-t0)/dur,1);
    const e=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2; // ease in-out
    tx=startTx+(ttx-startTx)*e;
    ty=startTy+(tty-startTy)*e;
    sc=startSc+(tsc-startSc)*e;
    applyT();
    if(p<1)requestAnimationFrame(step);
    else if(cb)cb();
  }
  requestAnimationFrame(step);
}
</script>
